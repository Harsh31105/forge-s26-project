          description: Student updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Student"
        "404":
          description: Student not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

    delete:
      summary: Delete a student
      description: Deletes a student by their UUID.
      tags: [Student]
      responses:
        "204":
          description: Student deleted successfully
        "404":
          description: Student not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

components:
  schemas:
    UuidParam:
      type: string
      format: uuid
      example: "2f4c8d2e-3b4f-4bb6-9a41-9f3d7d7c0a12"

    Error:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: integer
          description: HTTP status code
        message:
          anyOf:
            - type: string
            - type: object
          description: Error message or validation errors
          example: "Internal server error"

    BadRequestError:
      allOf:
        - $ref: "#/components/schemas/Error"
      example:
        code: 400
        message: "Bad request"

    InternalServerError:
      allOf:
        - $ref: "#/components/schemas/Error"
      example:
        code: 500
        message: "Internal server error"

    Sample:
      type: object
      required:
        - id
        - name
        - created_at
        - updated_at
      properties:
        id:
          type: string
          format: uuid
          description: The ID of the sample retrieved
          example: "0f171d80-f523-4c56-9e5c-1d825d484e01"
        name:
          type: string
          description: The name of the sample
          example: "Harsh Singh"
        created_at:
          type: string
          format: date-time
          example: "2024-01-15T10:30:00Z"
        updated_at:
          type: string
          format: date-time
          example: "2024-01-15T10:35:00Z"

    SamplePostInput:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          minLength: 1

    SamplePatchInput:
      type: object
      properties:
        name:
          type: string
          minLength: 1
        updated_at:
          type: string
          format: date-time
          example: "2024-01-15T10:35:00Z"

    Course:
      type: object
      required:
        - id
        - name
        - department
        - course_code
        - description
        - num_credits
        - created_at
        - updated_at
      properties:
        id:
          type: string
          format: uuid
          description: The ID of the course retrieved
          example: "1a2b3c4d-5678-90ab-cdef-1234567890ab"
        name:
          type: string
          description: The name of the course
          example: "Object Oriented Design"
        department:
          type: object
          required:
            - id
            - name
          description: The department offering the course
          properties:
            id:
              type: integer
              description: The ID of the department offering the course
              example: 1
            name:
              type: string
              description: The name of the department offering the course
              example: "CS"
        course_code:
          type: integer
          description: The identifying code for the course within the department
          example: 3500
        description:
          type: string
          description: A brief description of the course content and objectives
