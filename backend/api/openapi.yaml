        courseReviewId:
          $ref: "#/components/schemas/UuidParam"
        content:
          type: string
          maxLength: 2000
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    CourseThreadPostInput:
      type: object
