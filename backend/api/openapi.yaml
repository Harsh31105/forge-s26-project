    BaseReview:
      type: object
      required:
        - id
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
          format: uuid
          description: The unique ID of the review
          example: "57166e68-57ee-4fd4-a08f-2b3ea3bcd1bb"
        studentId:
          type: string
          format: uuid
          nullable: true
          description: The ID of the student who wrote the review (null if anonymous)
          example: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
        semester: 
          type: string
          enum: [fall, spring, summer_1, summer_2]
          nullable: true
          description: The semester the review is referring to
          example: "fall"
        year: 
          type: integer
          nullable: true
          description: The year the review is referring to
          example: 2022
        rating:
          type: integer
          minimum: 1
          maximum: 5
          description: Rating from 1 (worst) to 5 (best)
          example: 4
        reviewText:
          type: string
          minLength: 1
          maxLength: 2000
          description: The review content (profanity is censored automatically)
          example: "Great course, highly recommend!"
        tags:
          type: array
          nullable: true
          items:
            type: string
          description: Optional tags attached to the review
          example: ["challenging", "rewarding"]
        createdAt:
          type: string
          format: date-time
          example: "2026-01-15T10:30:00Z"
        updatedAt:
          type: string
          format: date-time
          example: "2026-01-15T10:30:00Z"

    CourseReview:
      allOf:
        - $ref: "#/components/schemas/BaseReview"
        - type: object
          required:
            - courseId
          properties:
            courseId:
              type: string
              format: uuid
              description: The ID of the course being reviewed
              example: "d9b1d7db-5c8e-4a9b-9f0e-1c2f3a4b5c6d"

    ProfessorReview:
      allOf:
        - $ref: "#/components/schemas/BaseReview"
        - type: object
          required:
            - professorId
          properties:
            professorId:
              type: string
              format: uuid
              description: The ID of the professor being reviewed
              example: "c3d4e5f6-a7b8-9012-cdef-123456789012"

    Review:
      oneOf:
        - $ref: "#/components/schemas/CourseReview"
        - $ref: "#/components/schemas/ProfessorReview"

    ReviewPostInput:
      type: object
      required:
        - rating
        - reviewText
      properties:
        studentId:
          type: string
          format: uuid
          nullable: true
          description: The ID of the student submitting the review (omit for anonymous)
          example: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
        semester: 
          type: string
          enum: [fall, spring, summer_1, summer_2]
          nullable: true
          description: The semester the review is referring to
          example: "fall"
        year: 
          type: integer
          nullable: true
          description: The year the review is referring to
          example: 2022
        rating:
          type: integer
          minimum: 1
          maximum: 5
          description: Rating from 1 (worst) to 5 (best)
          example: 4
        reviewText:
          type: string
          minLength: 1
          maxLength: 2000
          description: The review content
          example: "Great course, highly recommend!"
        courseId:
          type: string
          format: uuid
          nullable: true
          description: The ID of the course to review (mutually exclusive with professorId)
          example: "d9b1d7db-5c8e-4a9b-9f0e-1c2f3a4b5c6d"
        professorId:
          type: string
          format: uuid
          nullable: true
          description: The ID of the professor to review (mutually exclusive with courseId)
          example: "c3d4e5f6-a7b8-9012-cdef-123456789012"
        tags:
          type: array
          items:
            type: string
          description: Optional tags for the review
          example: ["challenging", "rewarding"]

    ReviewPatchInput:
      type: object
      properties:
        semester: 
          type: string
          enum: [fall, spring, summer_1, summer_2]
          nullable: true
          description: The semester the review is referring to
          example: "fall"
        year: 
          type: integer
          nullable: true
          description: The year the review is referring to
          example: 2022
        rating:
          type: integer
          minimum: 1
          maximum: 5
          description: Updated rating
          example: 5
        reviewText:
          type: string
          minLength: 1
          maxLength: 2000
          description: Updated review content (profanity will be censored)
          example: "Changed my mind, this course is excellent!"
        tags:
          type: array
          nullable: true
          items:
            type: string
          description: Updated tags (null clears all tags)
          example: ["rewarding"]

