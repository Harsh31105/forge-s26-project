openapi: 3.1.0
info:
  title: NorthStar API
  version: 0.1.0

servers:
  - url: http://localhost:8080/api/v1
    description: Development server

tags:
  - name: Health
    description: Health check operations
  - name: CourseReview
    description: Manage discussion threads that belong to a specific course review.
  - name: Sample
    description: Sample API Endpoint for Reference
  - name: Course
    description: API Endpoint for Specific Course Operations
  - name: Professor
    description: Professor CRUD operations
  - name: Student
    description: Student CRUD operations

paths:
  /health:
    get:
      summary: Health check
      description: Check if the API is running and healthy.
      tags: [Health]
      responses:
        "200":
          description: API is healthy (status code only)
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InternalServerError"

  /course-reviews/{id}/threads:
    get:
      summary: List threads for a course review
      description: |
        Returns all thread messages associated with a single course review (identified by the course review UUID).
        This is used to display the discussion/comments under a course review in the UI.
      tags: [CourseReview]
      parameters:
        - name: id
          in: path
          required: true
          description: Course review ID (UUID)
          schema:
            $ref: "#/components/schemas/UuidParam"
        - name: page
          in: query
          description: Page number of pagination
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: limit
          in: query
          description: Number of items per page in pagination
          schema:
            type: integer
            minimum: 1
            default: 10
      responses:
        "200":
          description: List of threads
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CourseThread"
        "400":
          description: Invalid course review id
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BadRequestError"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InternalServerError"

    post:
      summary: Create a thread on a course review
      description: |
        Creates a new thread message under a specific course review.
        The course review ID comes from the path, and the request body provides the studentId and message content.
      tags: [CourseReview]
      parameters:
        - name: id
          in: path
          required: true
          description: Course review ID (UUID)
          schema:
            $ref: "#/components/schemas/UuidParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CourseThreadPostInput"
      responses:
        "201":
          description: Created thread
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CourseThread"
        "400":
          description: Bad request (validation error)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BadRequestError"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InternalServerError"

  /course-reviews/{course_review_id}/threads/{thread_id}:
    patch:
      summary: Update a thread
      description: |
        Updates an existing thread message under a course review.
        The course review ID and thread ID are provided in the path; the request body includes the updated content.
      tags: [CourseReview]
      parameters:
        - name: course_review_id
          in: path
          required: true
          description: Course review ID (UUID)
          schema:
            $ref: "#/components/schemas/UuidParam"
        - name: thread_id
          in: path
          required: true
          description: Thread ID (UUID)
          schema:
            $ref: "#/components/schemas/UuidParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CourseThreadPatchInput"
      responses:
        "200":
          description: Updated thread
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CourseThread"
        "400":
          description: Bad request (invalid id or validation error)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BadRequestError"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InternalServerError"

    delete:
      summary: Delete a thread
      description: |
        Deletes a thread message under a course review.
        The course review ID and thread ID are provided in the path.
      tags: [CourseReview]
      parameters:
        - name: course_review_id
          in: path
          required: true
          description: Course review ID (UUID)
          schema:
            $ref: "#/components/schemas/UuidParam"
        - name: thread_id
          in: path
          required: true
          description: Thread ID (UUID)
          schema:
            $ref: "#/components/schemas/UuidParam"
      responses:
        "204":
          description: Deleted
        "400":
          description: Bad request (invalid id)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BadRequestError"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InternalServerError"

  /samples:
    get:
      summary: Getting Samples
      description: This endpoint gets all samples that we have
      tags: [Sample]
      parameters:
        - name: page
          in: query
          description: Page number of pagination
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: limit
          in: query
          description: Number of items per page in pagination
          schema:
            type: integer
            minimum: 1
            default: 10
      responses:
        "200":
          description: API is working!
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Sample"
        "400":
          description: bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                code: 400
                message: "bad request"
        "409":
          description: conflict error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                code: 409
                message: "duplicate or conflict value"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                code: 500
                message: "Internal server error"

    post:
      summary: Create a New Sample
      description: This endpoint creates a new sample with the provided details
      tags: [Sample]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SamplePostInput"
      responses:
        "201":
          description: Successfully created a new sample
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Sample"
        "400":
          description: Bad request due to invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                code: 400
                message: "Invalid input data for creating a course"
        "409":
          description: Conflict error due to duplicate course name
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                code: 409
                message: "A course with the same name already exists"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                code: 500
                message: "Internal server error"

  /samples/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
        description: The unique identifier of the course to retrieve
        example: "1a2b3c4d-5678-90ab-cdef-1234567890ab"
    get:
      summary: Get Sample by ID
      description: This endpoint retrieves a specific sample by its ID
      tags: [Sample]
      responses:
        "200":
          description: Successfully retrieved the sample details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Sample"
        "400":
          description: Invalid sample ID format
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                code: 400
                message: "Invalid course ID format"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                code: 500
                message: "Internal server error"

    patch:
      summary: Update Sample by ID
      description: This endpoint updates the details of a specific sample by its ID
      tags: [Sample]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SamplePatchInput"
      responses:
        "200":
          description: Successfully updated the sample details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Sample"
        "400":
          description: Bad request due to invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                code: 400
                message: "Invalid input data for updating the sample"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                code: 500
                message: "Internal server error"

    delete:
      summary: Delete Sample by ID
      description: This endpoint deletes a specific sample by its ID
      tags: [Sample]
      responses:
        "204":
          description: Successfully deleted the sample (no content)
        "400":
          description: Invalid sample ID format
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                code: 400
                message: "Invalid course ID format"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                code: 500
                message: "Internal server error"

  /courses:
    get:
      summary: Getting All Courses
      description: This endpoint retrieves all available courses as a list
      tags: [Course]
      parameters:
        - name: page
          in: query
          description: Page number of pagination
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: limit
          in: query
          description: Number of items per page in pagination
          schema:
            type: integer
            minimum: 1
            default: 10
      responses:
        "200":
          description: Successfully retrieved list of courses
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Course"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                code: 400
                message: "bad request"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                code: 500
                message: "Internal server error"

    post:
      summary: Create a New Course
      description: This endpoint creates a new course with the provided details
      tags: [Course]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CoursePostInput"
      responses:
        "201":
          description: Successfully created a new course
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Course"
        "400":
          description: Bad request due to invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                code: 400
                message: "Invalid input data for creating a course"
        "409":
          description: Conflict error due to duplicate course name
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                code: 409
                message: "A course with the same name already exists"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                code: 500
                message: "Internal server error"

  /courses/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
        description: The unique identifier of the course to retrieve
        example: "1a2b3c4d-5678-90ab-cdef-1234567890ab"
    get:
      summary: Get Course by ID
      description: This endpoint retrieves a specific course by its ID
      tags: [Course]
      responses:
        "200":
          description: Successfully retrieved the course details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Course"
        "400":
          description: Invalid course ID format
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                code: 400
                message: "Invalid course ID format"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                code: 500
                message: "Internal server error"

    patch:
      summary: Update Course by ID
      description: This endpoint updates the details of a specific course by its ID
      tags: [Course]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CoursePatchInput"
      responses:
        "200":
          description: Successfully updated the course details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Course"
        "400":
          description: Bad request due to invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                code: 400
                message: "Invalid input data for updating the course"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                code: 500
                message: "Internal server error"

    delete:
      summary: Delete Course by ID
      description: This endpoint deletes a specific course by its ID
      tags: [Course]
      responses:
        "204":
          description: Successfully deleted the course (no content)
        "400":
          description: Invalid course ID format
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                code: 400
                message: "Invalid course ID format"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                code: 500
                message: "Internal server error"

  /professors:
    get:
      summary: Get all professors
      description: Returns a list of all professors
      tags: [Professor]
      parameters:
        - name: page
          in: query
          description: Page number of pagination
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: limit
          in: query
          description: Number of items per page in pagination
          schema:
            type: integer
            minimum: 1
            default: 10
      responses:
        "200":
          description: list of professors retrieved successfully
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Professor"
        "400":
          description: bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                code: 400
                message: "bad request"
        "500":
          description: internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

    post:
      summary: Create a professor
      description: Creates a new professor
      tags: [Professor]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProfessorPostInput"
      responses:
        "201":
          description: professor created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Professor"
        "400":
          description: invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                code: 400
                message: "invalid input data for creating a professor"
        "500":
          description: internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /professors/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
        description: the unique identifier of the professor
        example: "0f171d80-f523-4c56-9e5c-1d825d484e01"

    get:
      summary: Get professor by ID
      description: Returns a single professor by their UUID
      tags: [Professor]
      responses:
        "200":
          description: professor found successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Professor"
        "400":
          description: invalid uuid format
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                code: 400
                message: "invalid uuid was given"
        "404":
          description: professor not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                code: 404
                message: "professor with given id not found"
        "500":
          description: internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

    patch:
      summary: Update a professor
      description: Partially updates a professor by their UUID
      tags: [Professor]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProfessorPatchInput"
      responses:
        "200":
          description: professor updated successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Professor"
        "400":
          description: invalid input or uuid
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                code: 400
                message: "invalid input data for updating the professor"
        "404":
          description: professor not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                code: 404
                message: "professor with given id not found"
        "500":
          description: internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

    delete:
      summary: Delete a professor
      description: Deletes a professor by their UUID
      tags: [Professor]
      responses:
        "204":
          description: professor deleted successfully
        "400":
          description: invalid uuid format
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                code: 400
                message: "invalid uuid was given"
        "500":
          description: internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

# student
  /students:
    get:
      summary: Get all students
      description: Returns a list of all students with ID, first name, last name, email, graduation year, and preferences.
      tags: [Student]
      parameters:
        - name: page
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
          example: 1
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
          example: 10
      responses:
        "200":
          description: List of students
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Student"
        "400":
          description: Invalid pagination parameters
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

    post:
      summary: Create a student
      description: Create a new student with the provided information.
      tags: [Student]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StudentPostInput"
      responses:
        "201":
          description: Student created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Student"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /students/{id}:
