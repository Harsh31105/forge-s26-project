              schema:
                $ref: "#/components/schemas/InternalServerError"

# ------

  /samples:
    get:
      summary: Getting Samples
      description: This endpoint gets all samples that we have
      tags: [Sample]
      parameters:
        - name: page
          in: query
          description: Page number of pagination
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: limit
          in: query
          description: Number of items per page in pagination
          schema:
            type: integer
            minimum: 1
            default: 10
      responses:
        "200":
          description: API is working!
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref:
                    "#/components/schemas/Sample"
        "400":
          description: bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                code: 400
                message: "bad request"
        "409":
          description: conflict error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                code: 409
                message: "duplicate or conflict value"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                code: 500
                message: "Internal server error"

    post:
      summary: Create a New Sample
      description: This endpoint creates a new sample with the provided details
      tags: [ Sample ]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SamplePostInput"
      responses:
        "201":
          description: Successfully created a new sample
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Sample"
        "400":
          description: Bad request due to invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                code: 400
                message: "Invalid input data for creating a course"
        "409":
          description: Conflict error due to duplicate course name
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                code: 409
                message: "A course with the same name already exists"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                code: 500
                message: "Internal server error"

  /samples/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
        description: The unique identifier of the course to retrieve
        example: "1a2b3c4d-5678-90ab-cdef-1234567890ab"
    get:
      summary: Get Sample by ID
      description: This endpoint retrieves a specific sample by its ID
      tags: [ Sample ]
      responses:
        "200":
          description: Successfully retrieved the sample details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Sample"
        "400":
          description: Invalid sample ID format
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                code: 400
                message: "Invalid course ID format"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                code: 500
                message: "Internal server error"

    patch:
      summary: Update Sample by ID
      description: This endpoint updates the details of a specific sample by its ID
      tags: [ Sample ]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SamplePatchInput"
      responses:
        "200":
          description: Successfully updated the sample details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Sample"
        "400":
          description: Bad request due to invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                code: 400
                message: "Invalid input data for updating the sample"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                code: 500
                message: "Internal server error"
    delete:
      summary: Delete Sample by ID
      description: This endpoint deletes a specific sample by its ID
      tags: [ Sample ]
      responses:
        "204":
          description: Successfully deleted the sample (no content)
        "400":
          description: Invalid sample ID format
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                code: 400
                message: "Invalid course ID format"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                code: 500
                message: "Internal server error"

  /courses:
    get:
      summary: Getting All Courses
      description: This endpoint retrieves all available courses as a list
      tags: [Course]
      parameters:
        - name: page
          in: query
          description: Page number of pagination
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: limit
          in: query
          description: Number of items per page in pagination
          schema:
            type: integer
            minimum: 1
            default: 10
      responses:
        "200":
          description: Successfully retrieved list of courses
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Course"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                code: 400
                message: "bad request"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                code: 500
                message: "Internal server error"
    post:
      summary: Create a New Course
      description: This endpoint creates a new course with the provided details
      tags: [Course]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CoursePostInput"
      responses:
        "201":
          description: Successfully created a new course
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Course"
        "400":
          description: Bad request due to invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                code: 400
                message: "Invalid input data for creating a course"
        "409":
          description: Conflict error due to duplicate course name
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                code: 409
                message: "A course with the same name already exists"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                code: 500
                message: "Internal server error"

  /courses/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
        description: The unique identifier of the course to retrieve
        example: "1a2b3c4d-5678-90ab-cdef-1234567890ab"
    get:
      summary: Get Course by ID
      description: This endpoint retrieves a specific course by its ID
      tags: [Course]
      responses:
        "200":
          description: Successfully retrieved the course details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Course"
        "400":
          description: Invalid course ID format
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                code: 400
                message: "Invalid course ID format"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                code: 500
                message: "Internal server error"
    patch:
      summary: Update Course by ID
      description: This endpoint updates the details of a specific course by its ID
      tags: [Course]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CoursePatchInput"
      responses:
        "200":
          description: Successfully updated the course details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Course"
        "400":
          description: Bad request due to invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                code: 400
                message: "Invalid input data for updating the course"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                code: 500
                message: "Internal server error"
    delete:
      summary: Delete Course by ID
      description: This endpoint deletes a specific course by its ID
      tags: [Course]
      responses:
        "204":
          description: Successfully deleted the course (no content)
        "400":
          description: Invalid course ID format
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                code: 400
                message: "Invalid course ID format"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                code: 500
                message: "Internal server error"

  /reviews:
    get:
      summary: Get all reviews
      description: Returns a paginated list of all course and professor reviews.
      tags: [Review]
      parameters:
        - name: limit
          in: query
          description: Number of items to return (1–100)
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 10
        - name: offset
          in: query
          description: Number of items to skip
          schema:
            type: integer
            minimum: 0
            default: 0
      responses:
        "200":
          description: List of reviews
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Review"
        "400":
          description: Invalid pagination parameters
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BadRequestError"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InternalServerError"

    post:
      summary: Create a review
      description: |
        Creates a new course or professor review.
        Exactly one of `courseId` or `professorId` must be provided.
      tags: [Review]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReviewPostInput"
      responses:
        "201":
          description: Created review
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Review"
        "400":
          description: Invalid input (missing fields, both/neither courseId and professorId, out-of-range rating, foreign key violation)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BadRequestError"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InternalServerError"

  /reviews/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          $ref: "#/components/schemas/UuidParam"
        description: Review ID (UUID)

    get:
      summary: Get review by ID
      description: Returns a single course or professor review by its UUID.
      tags: [Review]
      responses:
        "200":
          description: Review found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Review"
        "400":
          description: Invalid UUID format
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BadRequestError"
        "404":
          description: Review not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                code: 404
                message: "review not found"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InternalServerError"

    patch:
      summary: Update a review
      description: Partially updates an existing review. Review text is automatically censored for profanity.
      tags: [Review]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReviewPatchInput"
      responses:
        "200":
          description: Updated review
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Review"
        "400":
          description: Invalid UUID or input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BadRequestError"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InternalServerError"

    delete:
      summary: Delete a review
      description: Deletes a review by its UUID.
      tags: [Review]
      responses:
        "204":
          description: Review deleted (no content)
        "400":
          description: Invalid UUID format
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BadRequestError"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InternalServerError"

  # top-level resource, no nesting needed
  /professors:
    get:
      # returns all professors w/ pagination
      summary: Get all professors
      description: Returns a list of all professors
      tags: [Professor]
      parameters:
        - name: page
          in: query
          description: Page number of pagination
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: limit
          in: query
          description: Number of items per page in pagination
          schema:
            type: integer
            minimum: 1
            default: 10
      responses:
        "200":
          description: list of professors retrieved successfully
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Professor"
        "400":
          description: bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                code: 400
                message: "bad request"
        "500":
          description: internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

    post:
      # creates a new professor, firstName and lastName are required
      summary: Create a professor
      description: Creates a new professor
      tags: [Professor]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProfessorPostInput"
      responses:
        "201":
          description: professor created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Professor"
        "400":
          description: invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                code: 400
                message: "invalid input data for creating a professor"
        "500":
          description: internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  # path param shared across get, patch, delete
  /professors/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
        description: the unique identifier of the professor
        example: "0f171d80-f523-4c56-9e5c-1d825d484e01"

    get:
      # returns a single professor by uuid
      summary: Get professor by ID
      description: Returns a single professor by their UUID
      tags: [Professor]
      responses:
        "200":
          description: professor found successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Professor"
        "400":
          description: invalid uuid format
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                code: 400
                message: "invalid uuid was given"
        "404":
          description: professor not found
          content:
            application/json:
              schema:
