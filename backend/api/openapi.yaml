    # professor object returned by all endpoints
    Professor:
      type: object
      required:
        - id
        - firstName
        - lastName
        - createdAt
        - updatedAt
      properties:
        id:
          # uuid generated by the database
          type: string
          format: uuid
          description: the unique id of the professor
          example: "0f171d80-f523-4c56-9e5c-1d825d484e01"
        firstName:
          type: string
          description: the first name of the professor
          example: "John"
        lastName:
          type: string
          description: the last name of the professor
          example: "Doe"
        tags:
          # nullable - professor may not have any location tags
          type: array
          nullable: true
          items:
            type: string
            enum: [boston, oakland, london]
          description: location tags for the professor
          example: ["boston"]
        createdAt:
          type: string
          format: date-time
          example: "2024-01-15T10:30:00Z"
        updatedAt:
          type: string
          format: date-time
          example: "2024-01-15T10:35:00Z"

    # input for creating a new professor
    ProfessorPostInput:
      type: object
      required:
        - firstName
        - lastName
      properties:
        firstName:
          # cannot be empty or have leading/trailing spaces (validated by zod)
          type: string
          minLength: 1
          example: "John"
        lastName:
          # cannot be empty or have leading/trailing spaces (validated by zod)
          type: string
          minLength: 1
          example: "Doe"
        tags:
          # optional, defaults to null if not provided
          type: array
          nullable: true
          items:
            type: string
            enum: [boston, oakland, london]
          example: ["boston"]

    # input for patching a professor, all fields optional
    ProfessorPatchInput:
      type: object
      properties:
        firstName:
          type: string
          minLength: 1
          example: "John"
        lastName:
          type: string
          minLength: 1
          example: "Doe"
        tags:
          type: array
          nullable: true
          items:
            type: string
            enum: [boston, oakland, london]
          example: ["boston"]

    RMP:
      type: object
      required:
        - id
        - professorId
        - avgDifficulty
        - createdAt
        - updatedAt
      properties:
        id:
          type: integer
          example: 1
        professorId:
          type: string
          format: uuid
          example: "0f171d80-f523-4c56-9e5c-1d825d484e01"
        ratingAvg:
          type: string
          nullable: true
          example: "4.50"
        ratingWta:
          type: integer
          nullable: true
          example: 85
        avgDifficulty:
