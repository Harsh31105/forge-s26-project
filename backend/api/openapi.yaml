  /auth/signin:
    get:
      summary: Signin Feature with Google
      description: Redirects the user to Google's OAuth consent screen for authentication
      tags: [ Auth ]
      responses:
        "302":
          description: Redirect to Google OAuth consent screen
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                code: 500
                message: "Internal server error"

  /auth/callback:
    get:
      summary: Google OAuth callback
      description: Handles redirect from Google after authentication, validating Northeastern email, and creating or finding student
      tags: [ Auth ]
      parameters:
        - name: code
          in: query
          required: true
          description: Authorization code from Google OAuth 2.0
          schema:
            type: string
      responses:
        "200":
          description: Existing student logged in successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Login successful"
                  token:
                    type: string
                    description: JWT access token
                    example: "eyJhbGciOi..."
        "201":
          description: New student created successfully
          content:
            application/json

  /traces:
    get:
      summary: Get all traces
      description: Returns a paginated list of trace records.
      tags: [ Trace ]
      parameters:
        - name: page
          in: query
          required: false
          description: Page number of pagination
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: limit
          in: query
          required: false
          description: Number of items per page
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 10
      responses:
        "200":
          description: List of traces
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Trace"
        "400":
          description: Invalid pagination parameters
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BadRequestError"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InternalServerError"

