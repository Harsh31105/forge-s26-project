      - name: id
        in: path
        required: true
        description: Student UUID
        schema:
          type: string
          format: uuid

    get:
      summary: Get student by ID
      description: Returns a single student by their UUID.
      tags: [Student]
      responses:
        "200":
          description: Student found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Student"
        "404":
          description: Student not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

    patch:
      summary: Update a student
      description: Update a student's information using their UUID.
      tags: [Student]
      requestBody:
