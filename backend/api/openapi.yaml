openapi: 3.1.0
info:
  title: NorthStar API
  version: 0.1.0

servers:
  - url: http://localhost:8080/api/v1
    description: Development server

tags:
  - name: Health
    description: Health check operations
  - name: CourseReview
    description: Manage discussion threads that belong to a specific course review.
  - name: Sample
    description: Sample API Endpoint for Reference
  - name: Course
    description: API Endpoint for Specific Course Operations
  - name: Professor
    description: Professor CRUD operations
  - name: RMP
    description: Rate My Professor data operations
  - name: Student
    description: Student CRUD operations
  - name: Review
    description: Course and professor review CRUD operations
  - name: Auth
    description: Authentication Management Operations for Google OAuth 2.0
  - name: ProfessorReview
    description: API Endpoint for Specific Professor Review
  - name: Favourite
    description: Favourite CRUD Operations
  - name: Trace
    description: API Endpoints to directly do with TRACE Evaluations
  - name: Academic
    description: Academic data endpoints for majors, minors, and concentrations
  - name: Recommendation
    description: API endpoing for the recommendation algorithm for the student
  - name: AiSummary
    description: AI-generated summaries of popular course and professor reviews

paths:
  /health:
    get:
      summary: Health check
      description: Check if the API is running and healthy.
      tags: [Health]
      responses:
        "200":
          description: API is healthy (status code only)
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InternalServerError"

  /course-reviews/{id}/threads:
    get:
      summary: List threads for a course review
      description: |
        Returns all thread messages associated with a single course review (identified by the course review UUID).
        This is used to display the discussion/comments under a course review in the UI.
      tags: [CourseReview]
      parameters:
        - name: id
          in: path
          required: true
          description: Course review ID (UUID)
          schema:
            $ref: "#/components/schemas/UuidParam"
        - name: page
          in: query
          description: Page number of pagination
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: limit
          in: query
          description: Number of items per page in pagination
          schema:
            type: integer
            minimum: 1
            default: 10
      responses:
        "200":
          description: List of threads
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CourseThread"
        "400":
          description: Invalid course review id
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BadRequestError"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InternalServerError"

    post:
      summary: Create a thread on a course review
      description: |
        Creates a new thread message under a specific course review.
        The course review ID comes from the path, and the request body provides the studentId and message content.
      tags: [CourseReview]
      parameters:
        - name: id
          in: path
          required: true
          description: Course review ID (UUID)
          schema:
            $ref: "#/components/schemas/UuidParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CourseThreadPostInput"
      responses:
        "201":
          description: Created thread
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CourseThread"
        "400":
          description: Bad request (validation error)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BadRequestError"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InternalServerError"

  /course-reviews/{course_review_id}/threads/{thread_id}:
    patch:
      summary: Update a thread
      description: |
        Updates an existing thread message under a course review.
        The course review ID and thread ID are provided in the path; the request body includes the updated content.
      tags: [CourseReview]
      parameters:
        - name: course_review_id
          in: path
          required: true
          description: Course review ID (UUID)
          schema:
            $ref: "#/components/schemas/UuidParam"
        - name: thread_id
          in: path
          required: true
          description: Thread ID (UUID)
          schema:
            $ref: "#/components/schemas/UuidParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CourseThreadPatchInput"
      responses:
        "200":
          description: Updated thread
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CourseThread"
        "400":
          description: Bad request (invalid id or validation error)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BadRequestError"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InternalServerError"

    delete:
      summary: Delete a thread
      description: |
        Deletes a thread message under a course review.
        The course review ID and thread ID are provided in the path.
      tags: [CourseReview]
      parameters:
        - name: course_review_id
          in: path
          required: true
          description: Course review ID (UUID)
          schema:
            $ref: "#/components/schemas/UuidParam"
        - name: thread_id
          in: path
          required: true
          description: Thread ID (UUID)
          schema:
            $ref: "#/components/schemas/UuidParam"
      responses:
        "204":
          description: Deleted
        "400":
          description: Bad request (invalid id)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BadRequestError"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InternalServerError"

  /professor-reviews/{id}/threads:
    get:
      summary: List threads for a professor review
      description: |
        Returns all thread messages associated with a single professor review.
      tags: [ProfessorReview]
      parameters:
        - name: id
          in: path
          required: true
          description: Professor review ID (UUID)
          schema:
            $ref: "#/components/schemas/UuidParam"
        - name: page
          in: query
          description: Page number of pagination
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: limit
          in: query
          description: Number of items per page in pagination
          schema:
            type: integer
            minimum: 1
            default: 10
      responses:
        "200":
          description: List of professor review threads
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ProfThread"
        "400":
          description: Invalid professor review id
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BadRequestError"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InternalServerError"

    post:
      summary: Create a thread on a professor review
      description: |
        Creates a new thread message under a professor review.
      tags: [ProfessorReview]
      parameters:
        - name: id
          in: path
          required: true
          description: Professor review ID (UUID)
          schema:
            $ref: "#/components/schemas/UuidParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProfThreadPostInput"
      responses:
        "201":
          description: Created thread
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProfThread"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BadRequestError"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InternalServerError"

  /professor-reviews/{professor_review_id}/threads/{thread_id}:
    patch:
      summary: Update a professor review thread
      tags: [ProfessorReview]
      parameters:
        - name: professor_review_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/UuidParam"
        - name: thread_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/UuidParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProfThreadPatchInput"
      responses:
        "200":
          description: Updated thread
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProfThread"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BadRequestError"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InternalServerError"

    delete:
      summary: Delete a professor review thread
      tags: [ProfessorReview]
      parameters:
        - name: professor_review_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/UuidParam"
        - name: thread_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/UuidParam"
      responses:
        "204":
          description: Deleted
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BadRequestError"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InternalServerError"

  /samples:
    get:
      summary: Getting Samples
      description: This endpoint gets all samples that we have
      tags: [Sample]
      parameters:
        - name: page
          in: query
          description: Page number of pagination
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: limit
          in: query
          description: Number of items per page in pagination
          schema:
            type: integer
            minimum: 1
            default: 10
      responses:
        "200":
          description: API is working!
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref:
                    "#/components/schemas/Sample"
        "400":
          description: bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                code: 400
                message: "bad request"
        "409":
          description: conflict error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                code: 409
                message: "duplicate or conflict value"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                code: 500
                message: "Internal server error"

    post:
      summary: Create a New Sample
      description: This endpoint creates a new sample with the provided details
      tags: [ Sample ]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SamplePostInput"
      responses:
        "201":
          description: Successfully created a new sample
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Sample"
        "400":
          description: Bad request due to invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                code: 400
                message: "Invalid input data for creating a course"
        "409":
          description: Conflict error due to duplicate course name
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                code: 409
                message: "A course with the same name already exists"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                code: 500
                message: "Internal server error"

  /samples/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
        description: The unique identifier of the course to retrieve
        example: "1a2b3c4d-5678-90ab-cdef-1234567890ab"
    get:
      summary: Get Sample by ID
      description: This endpoint retrieves a specific sample by its ID
      tags: [ Sample ]
      responses:
        "200":
          description: Successfully retrieved the sample details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Sample"
        "400":
          description: Invalid sample ID format
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                code: 400
                message: "Invalid course ID format"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                code: 500
                message: "Internal server error"

    patch:
      summary: Update Sample by ID
      description: This endpoint updates the details of a specific sample by its ID
      tags: [ Sample ]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SamplePatchInput"
      responses:
        "200":
          description: Successfully updated the sample details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Sample"
        "400":
          description: Bad request due to invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                code: 400
                message: "Invalid input data for updating the sample"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                code: 500
                message: "Internal server error"
    delete:
      summary: Delete Sample by ID
      description: This endpoint deletes a specific sample by its ID
      tags: [ Sample ]
      responses:
        "204":
          description: Successfully deleted the sample (no content)
        "400":
          description: Invalid sample ID format
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                code: 400
                message: "Invalid course ID format"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                code: 500
                message: "Internal server error"

  /courses:
    get:
      summary: Getting All Courses
      description: This endpoint retrieves all available courses as a list
      tags: [Course]
      parameters:
        - name: page
          in: query
          description: Page number of pagination
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: limit
          in: query
          description: Number of items per page in pagination
          schema:
            type: integer
            minimum: 1
            default: 10
        # add below filtering params 
        - name: department_id
          in: query
          description: Filter by department ID
          schema:
            type: integer
        - name: course_code
          in: query
          description: Filter by course code
          schema:
            type: integer
        - name: num_credits
          in: query
          description: Filter by number of credits
          schema:
            type: integer
        - name: lecture_type
          in: query
          description: Filter by lecture type
          schema:
            type: string
            enum: [lecture, lab, online]
        - name: sortBy
          in: query
          description: Field to sort by
          schema:
            type: string
            enum: [name, course_code, num_credits, created_at]
        - name: sortOrder
          in: query
          description: Sort direction
          schema:
            type: string
            enum: [asc, desc]
            default: asc
      responses:
        "200":
          description: Successfully retrieved list of courses
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Course"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                code: 400
                message: "bad request"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                code: 500
                message: "Internal server error"
    post:
      summary: Create a New Course
      description: This endpoint creates a new course with the provided details
      tags: [Course]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CoursePostInput"
      responses:
        "201":
          description: Successfully created a new course
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Course"
        "400":
          description: Bad request due to invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                code: 400
                message: "Invalid input data for creating a course"
        "409":
          description: Conflict error due to duplicate course name
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                code: 409
                message: "A course with the same name already exists"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                code: 500
                message: "Internal server error"

  /courses/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
        description: The unique identifier of the course to retrieve
        example: "1a2b3c4d-5678-90ab-cdef-1234567890ab"
    get:
      summary: Get Course by ID
      description: This endpoint retrieves a specific course by its ID
      tags: [Course]
      responses:
        "200":
          description: Successfully retrieved the course details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Course"
        "400":
          description: Invalid course ID format
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                code: 400
                message: "Invalid course ID format"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                code: 500
                message: "Internal server error"
    patch:
      summary: Update Course by ID
      description: This endpoint updates the details of a specific course by its ID
      tags: [Course]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CoursePatchInput"
      responses:
        "200":
          description: Successfully updated the course details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Course"
        "400":
          description: Bad request due to invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                code: 400
                message: "Invalid input data for updating the course"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                code: 500
                message: "Internal server error"
    delete:
      summary: Delete Course by ID
      description: This endpoint deletes a specific course by its ID
      tags: [Course]
      responses:
        "204":
          description: Successfully deleted the course (no content)
        "400":
          description: Invalid course ID format
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                code: 400
                message: "Invalid course ID format"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                code: 500
                message: "Internal server error"

  /courses/{id}/best-professors:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
        description: The unique identifier of the course
        example: "1a2b3c4d-5678-90ab-cdef-1234567890ab"
    get:
      summary: Get best professors for a course
      description: Returns professors who have taught this course, sorted by their average efficiency rating from TRACE data (descending)
      tags: [Course]
      responses:
        "200":
          description: Successfully retrieved best professors for the course
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Professor"
        "400":
          description: Invalid course ID format
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                code: 400
                message: "invalid ID was given"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                code: 500
                message: "Internal server error"

  /courses/{id}/favourites:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
        description: The unique identifier of the course to retrieve
        example: "1a2b3c4d-5678-90ab-cdef-1234567890ab"

    get:
      summary: Getting Favourites for this Course
      description: Returns a list of all Favourites corresponding to this Course.
      tags: [ Course ]
      responses:
        "200":
          description: List of favourites
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Favourite"
        "400":
          description: Invalid pagination parameters
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BadRequestError"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InternalServerError"

  /reviews:
    get:
      summary: Get all reviews
      description: Returns a paginated list of all course and professor reviews.
      tags: [Review]
      parameters:
        - name: limit
          in: query
          description: Number of items to return (1–100)
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 10
        - name: offset
          in: query
          description: Number of items to skip
          schema:
            type: integer
            minimum: 0
            default: 0
      responses:
        "200":
          description: List of reviews
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Review"
        "400":
          description: Invalid pagination parameters
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BadRequestError"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InternalServerError"

    post:
      summary: Create a review
      description: |
        Creates a new course or professor review.
        Exactly one of `courseId` or `professorId` must be provided.
      tags: [Review]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReviewPostInput"
      responses:
        "201":
          description: Created review
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Review"
        "400":
          description: Invalid input (missing fields, both/neither courseId and professorId, out-of-range rating, foreign key violation)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BadRequestError"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InternalServerError"

  /reviews/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          $ref: "#/components/schemas/UuidParam"
        description: Review ID (UUID)

    get:
      summary: Get review by ID
      description: Returns a single course or professor review by its UUID.
      tags: [Review]
      responses:
        "200":
          description: Review found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Review"
        "400":
          description: Invalid UUID format
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BadRequestError"
        "404":
          description: Review not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                code: 404
                message: "review not found"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InternalServerError"

    patch:
      summary: Update a review
      description: Partially updates an existing review. Review text is automatically censored for profanity.
      tags: [Review]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReviewPatchInput"
      responses:
        "200":
          description: Updated review
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Review"
        "400":
          description: Invalid UUID or input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BadRequestError"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InternalServerError"

    delete:
      summary: Delete a review
