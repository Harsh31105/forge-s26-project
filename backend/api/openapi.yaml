    get:
      summary: Get the Offer History offered by the TRACE Records
      description: Retrieves paginated list of offer-history.
      tags: [ Trace ]
      parameters:
        - name: page
          in: query
          description: Page Number of Pagination
          schema:
            type: integer
            minimum: 1
            default: 1

        - name: limit
          in: query
          description: Number of items per page
          schema:
            type: integer
            minimum: 1
            default: 10

        # Filters
        - name: courseId
          in: query
          description: Filter by Course ID
          schema:
            type: string
            format: uuid

        - name: professorId
          in: query
          description: Filter by Professor ID
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Successfully retrieved TRACE records
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AcademicSemester"
        "400":
          description: Invalid query parameters
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BadRequestError"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InternalServerError"
  /recommendations:
    post:
      summary: Rule-based course recommendations
      description: Returns recommended courses for a student using a rule-based algorithm, scored and bucketed into high/medium/low tiers.
      tags: [ Recommendation ]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MLRequest"
      responses:
        "200":
          description: Recommended courses bucketed by score tier
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecommendResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InternalServerError"

  /recommendations/ml:
    post:
      summary: ML-based course recommendations
      description: Returns recommended courses for a student using a trained ML model, bucketed into high/medium/low tiers by probability.
      tags: [ Recommendation ]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MLRequest"
      responses:
        "200":
          description: Recommended courses bucketed by probability tier
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MLRecommendResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InternalServerError"

  /ai-summaries/popular:
    get:
      summary: Get popular conversations with AI summaries
      description: Returns the top most popular course and professor reviews ranked by a popularity score.
      tags: [AiSummary]
      security: []
      parameters:
        - name: limit
          in: query
          description: Number of popular reviews to return (max 20, default 5)
          schema:
            type: integer
            minimum: 1
            maximum: 20
            default: 5
      responses:
        "200":
          description: List of AI summaries for the most popular reviews
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AiSummary"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InternalServerError"

security:
  - bearerAuth: []
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    UuidParam:
      type: string
      format: uuid
      example: "2f4c8d2e-3b4f-4bb6-9a41-9f3d7d7c0a12"

    Error:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: integer
          description: HTTP status code
        message:
          anyOf:
            - type: string
            - type: object
          description: Error message or validation errors
          example: "Internal server error"

    BadRequestError:
      allOf:
        - $ref: "#/components/schemas/Error"
      example:
        code: 400
        message: "Bad request"

    InternalServerError:
      allOf:
        - $ref: "#/components/schemas/Error"
      example:
        code: 500
        message: "Internal server error"

    Sample:
      type: object
      required:
        - id
        - name
        - created_at
        - updated_at
      properties:
        id:
          type: string
          format: uuid
          description: The ID of the sample retrieved
          example: "0f171d80-f523-4c56-9e5c-1d825d484e01"
        name:
          type: string
          description: The name of the sample
          example: "Harsh Singh"
        created_at:
          type: string
          format: date-time
          example: "2024-01-15T10:30:00Z"
        updated_at:
          type: string
          format: date-time
          example: "2024-01-15T10:35:00Z"

    Course:
     type: object
     required:
        - id
        - name
        - department
        - course_code
        - description
        - num_credits
        - created_at
        - updated_at
     properties:
        id:
          type: string
          format: uuid
          description: The ID of the course retrieved
          example: "1a2b3c4d-5678-90ab-cdef-1234567890ab"
        name:
          type: string
          description: The name of the course
          example: "Object Oriented Design"
        department:
          type: object
          required:
            - id
            - name
          description: The department offering the course
          properties:
            id:
              type: integer
              description: The ID of the department offering the course
              example: 1
            name:
              type: string
              description: The name of the department offering the course
              example: "CS"
        course_code:
          type: integer
          description: The identifying code for the course within the department
          example: 3500
        description:
          type: string
          description: A brief description of the course content and objectives
          example: "An introductory course covering fundamental concepts in computer science, including programming, algorithms, and data structures."
        num_credits:
          type: integer
          description: The number of credits awarded for completing the course
          example: 4
        lecture_type:
          type: string
          enum: [lecture, lab, online]
          nullable: true
          description: The type of lecture format for the course
          example: "online"
        created_at:
          type: string
          format: date-time
          example: "2024-01-15T10:30:00Z"
        updated_at:
          type: string
          format: date-time
          example: "2024-01-15T10:35:00Z"

    CoursePostInput:
      type: object
      required:
        - name
        - department_id
        - course_code
        - description
        - num_credits
      properties:
        name:
          type: string
          description: The name of the course to be created
          example: "Object Oriented Design"
        department_id:
          type: integer
          description: The ID of the department offering the course
          example: 1
        course_code:
          type: integer
          minimum: 1000
          maximum: 10000
          description: The identifying code for the course within the department
          example: 3500
        description:
          type: string
          description: A brief description of the course content and objectives
          example: "An introductory course covering fundamental concepts in computer science, including programming, algorithms, and data structures."
        num_credits:
          type: integer
          minimum: 1
          maximum: 6
          description: The number of credits awarded for completing the course
          example: 4
        lecture_type:
          type: string
          enum: [lecture, lab, online]
          nullable: true
          description: The type of lecture format for the course
          example: "online"

    CoursePatchInput:
      type: object
      properties:
        name:
          type: string
          description: The name of the course to be created
          example: "Object Oriented Design"
        department_id:
          type: integer
          description: The ID of the department offering the course
          example: 1
        course_code:
          type: integer
          minimum: 1000
          maximum: 10000
          description: The identifying code for the course within the department
          example: 3500
        description:
          type: string
          description: A brief description of the course content and objectives
          example: "An introductory course covering fundamental concepts in computer science, including programming, algorithms, and data structures."
        num_credits:
          type: integer
          minimum: 1
          maximum: 6
          description: The number of credits awarded for completing the course
          example: 4
        lecture_type:
          type: string
          enum: [lecture, lab, online]
          description: The type of lecture format for the course
          example: "online"

    CourseThread:
      type: object
      required:
        - id
        - studentId
        - courseReviewId
        - content
        - createdAt
        - updatedAt
      properties:
        id:
          $ref: "#/components/schemas/UuidParam"
