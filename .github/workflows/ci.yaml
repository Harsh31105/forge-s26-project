---
# Continuous Integration workflow
# Runs linting, typechecking, tests, and builds on every push to main and on pull requests
name: CI

on:
  # Allow manual trigger from GitHub UI
  workflow_dispatch: {}
  # Run on pushes to main and feature branches
  push:
    branches:
      - main
  # Run on pull requests targeting main
  pull_request:
    branches:
      - main

jobs:
  # Linting job using MegaLinter
  lint:
    name: MegaLinter
    runs-on: ubuntu-latest
    steps:
      # Clone the repository code
      - name: Checkout Code
        uses: actions/checkout@v6
      # Run MegaLinter to check code quality
      - name: MegaLinter
        uses: oxsecurity/megalinter@v7
        env:
          # Enable all linters for JavaScript and TypeScript
          ENABLE: JAVASCRIPT,TYPESCRIPT
          # Post results as GitHub PR comments
          GITHUB_COMMENT_REPORTER: true
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Validate all files in the codebase
          VALIDATE_ALL_CODEBASE: true
          LOG_LEVEL: INFO

  # Typecheck job — runs tsc --noEmit in backend/
  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Cache backend node_modules
        uses: actions/cache@v4
        with:
          path: backend/node_modules
          key: ${{ runner.os }}-backend-node-modules-${{ hashFiles('backend/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-backend-node-modules-

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Run TypeScript typecheck
        working-directory: backend
        run: npx tsc --noEmit

  # Unit testing job
  unit-test:
    name: Run Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Cache backend node_modules
        uses: actions/cache@v4
        with:
          path: backend/node_modules
          key: ${{ runner.os }}-backend-node-modules-${{ hashFiles('backend/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-backend-node-modules-

      - name: Install dependencies
        working-directory: backend
        run: npm ci

      - name: Run tests
        run: npm test -- --coverage
        working-directory: backend

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        continue-on-error: true
        with:
          directory: backend/coverage
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  # Build job — depends on lint, typecheck, and unit-test all passing
  build:
    name: Build Images
    runs-on: ubuntu-latest
    needs: [lint, typecheck, unit-test]
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Cache frontend node_modules
        uses: actions/cache@v4
        with:
          path: frontend/node_modules
          key: ${{ runner.os }}-frontend-node-modules-${{ hashFiles('frontend/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-frontend-node-modules-

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Backend Image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./images/backend/Dockerfile
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build Frontend Image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./images/frontend/Dockerfile
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
